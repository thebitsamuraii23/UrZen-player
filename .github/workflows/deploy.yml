name: Deploy z-player to EC2

on:
  push:
    branches:
      - tests/updates

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Автоматизируем настройку SSH, чтобы ты ничего не сломал руками
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "unnecessary"
          if_key_exists: replace

      - name: Execute Remote Deployment
        run: |
          # 1. Очищаем секреты от пробелов и прочей нечисти
          HOST=$(echo "${{ secrets.SSH_HOST }}" | tr -d '[:space:')
          USER=$(echo "${{ secrets.SSH_USER }}" | tr -d '[:space:')
          
          # 2. Добавляем сервер в известные хосты
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          
          # 3. Запускаем деплой через SSH
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" << 'EOF'
            set -e

            # Уходим из-под root в нормальную домашнюю директорию
            TARGET_DIR="/home/$(whoami)/z-player"
            mkdir -p $TARGET_DIR
            cd $TARGET_DIR

            echo "➡️ Обновляем исходники..."
            if [ ! -d ".git" ]; then
              git clone -b tests/updates https://github.com/${{ github.repository }}.git .
            else
              git fetch origin tests/updates
              git reset --hard FETCH_HEAD
            fi

            echo "➡️ Проверяем Docker..."
            if ! command -v docker &> /dev/null; then
              echo "❌ Ошибка: Docker не установлен на сервере!"
              exit 1
            fi

            echo "➡️ Пересборка контейнера..."
            # Останавливаем старье, если оно есть
            docker stop z-player || true
            docker rm z-player || true
            
            # Собираем новый образ
            docker build -t z-player .

            echo "➡️ Запуск приложения..."
            docker run -d \
              --restart unless-stopped \
              --name z-player \
              -p 3001:3001 \
              z-player

            echo "✅ Деплой успешно завершен!"
          EOF
