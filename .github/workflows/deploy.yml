name: Deploy z-player to EC2

on:
  push:
    branches:
      - tests/updates

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          SSH_DIR="${HOME}/.ssh"
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"

          # Добавляем приватный ключ
          echo "${{ secrets.SSH_KEY }}" > "$SSH_DIR/id_ed25519"
          chmod 600 "$SSH_DIR/id_ed25519"

          # Берём hostname из секретов
          HOST=$(echo "${{ secrets.SERVER_HOST }}" | tr -d '\r\n ')
          if [ -z "$HOST" ]; then
            echo "SERVER_HOST is empty, exiting"
            exit 1
          fi

          # Проверяем доступность сервера
          ping -c 2 "$HOST" || { echo "Server $HOST is unreachable"; exit 1; }

          # Добавляем в known_hosts
          ssh-keyscan -H "$HOST" >> "$SSH_DIR/known_hosts"

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            echo "➡️ Go to project"
            cd /root/z-player

            echo "➡️ Pull latest code"
            git fetch origin
            git reset --hard origin/tests/updates

            echo "➡️ Stop old container if exists"
            docker stop z-player || true
            docker rm z-player || true

            echo "➡️ Build docker image"
            docker build -t z-player .

            echo "➡️ Run container"
            docker run -d \
              --restart unless-stopped \
              --name z-player \
              -p 3001:3001 \
              z-player

            echo "✅ Deploy finished"
          EOF
