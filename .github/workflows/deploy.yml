name: Deploy z-player to EC2

on:
  push:
    branches:
      - tests/updates

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Manual SSH Setup
        run: |
          # Создаем директорию для SSH
          mkdir -p ~/.ssh
          
          # Записываем ключ напрямую из секрета
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          
          # Выставляем жесткие права (SSH не примет ключ с правами 644)
          chmod 600 ~/.ssh/id_rsa
          
          # Сканируем хост, чтобы не было интерактивного вопроса про trust
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Run Deploy Script
        run: |
          # Коннектимся и выполняем деплой одной командой
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
            set -e
            
            # Определяем путь
            PROJECT_DIR="$HOME/z-player"
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            echo "➡️ Обновление кода..."
            if [ ! -d ".git" ]; then
              git clone -b tests/updates https://github.com/${{ github.repository }}.git .
            else
              git fetch origin tests/updates
              git reset --hard FETCH_HEAD
            fi

            echo "➡️ Docker rebuild..."
            # Если docker не в sudo группе, здесь всё упадет. Но ты же "всё настроил правильно".
            docker stop z-player || true
            docker rm z-player || true
            docker build -t z-player .
            
            echo "➡️ Docker run..."
            docker run -d \
              --restart unless-stopped \
              --name z-player \
              -p 3001:3001 \
              z-player

            echo "✅ Деплой окончен."
          EOF
