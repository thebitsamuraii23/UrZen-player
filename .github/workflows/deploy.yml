name: Deploy UrZen Web Player to EC2

on:
  push:
    branches:
      - tests/updates

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu  # или root, если включишь PermitRootLogin yes вручную
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -ex

            PROJECT_DIR="/home/ubuntu/z-player"  # если хочешь в /root - смени, но сначала почини права/логин
            STORAGE_DIR="/home/ubuntu/z-player-storage"
            DB_DIR="$STORAGE_DIR/db"
            MEDIA_DIR="$STORAGE_DIR/media"

            # Дебаг: кто мы и где home
            whoami
            pwd
            ls -ld /home/ubuntu || echo "Home dir проблема, права сломаны или юзер проблема"

            mkdir -p "$PROJECT_DIR"
            mkdir -p "$DB_DIR" "$MEDIA_DIR"
            cd "$PROJECT_DIR"

            echo "➡️ Обновление кода..."
            if [ ! -d ".git" ]; then
              git clone -b tests/updates https://github.com/thebitsamuraii23/UrZen-player.git .
            else
              git fetch origin tests/updates
              git reset --hard FETCH_HEAD
              git clean -fd
            fi

            git log -1 --pretty=format:"Последний коммит: %h %s %cr"

            echo "➡️ Работа с Docker..."
            sudo docker stop z-player || true

            sudo docker rm z-player || true
            sudo docker rmi z-player || true

            echo "➡️ Проверка места на диске..."
            df -h
            sudo docker system df || true

            echo "➡️ Очистка Docker cache/layers..."
            sudo docker container prune -f || true
            sudo docker image prune -af || true
            sudo docker builder prune -af || true
            sudo docker system df || true

            echo "➡️ Билд..."
            COMMIT_HASH=$(git rev-parse --short HEAD)
            if ! sudo docker build --pull --no-cache -t z-player:$COMMIT_HASH .; then
              echo "❌ Билд упал, ошибка!"
              exit 1
            fi

            echo "➡️ Запуск..."
            sudo docker run -d --restart unless-stopped \
              --name z-player \
              -p 3001:3001 \
              -e NODE_ENV=production \
              -e DB_PATH=/data/users.db \
              -v "$DB_DIR:/data" \
              -v "$MEDIA_DIR:/app/User/Downloads" \
              z-player:$COMMIT_HASH

            echo "✅ Статус:"
            sudo docker ps | grep z-player
            sudo docker logs --tail 20 z-player || true

            echo "➡️ Проверка PWA endpoints..."
            sleep 2
            curl -fsSI http://127.0.0.1:3001/manifest.json
            curl -fsSI http://127.0.0.1:3001/sw.js
            curl -fsSI http://127.0.0.1:3001/offline.html
            curl -fsS http://127.0.0.1:3001/manifest.json | grep -q '"name"'
            curl -fsS http://127.0.0.1:3001/index.html | grep -q 'rel="manifest"'
            echo "✅ PWA files are reachable on server"
