name: Deploy z-player to EC2

on:
  push:
    branches:
      - tests/updates

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary # Мы отключим проверку ниже для простоты
          if_key_exists: replace

      - name: Deploy via SSH
        run: |
          # Используем ssh-keyscan, чтобы не ловить ошибки Host Verification
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            
            # Определяем рабочую директорию (лучше не в /root, если ты не маньяк)
            TARGET_DIR="/home/${{ secrets.SSH_USER }}/z-player"
            mkdir -p $TARGET_DIR
            cd $TARGET_DIR

            echo "➡️ Updating code..."
            if [ ! -d ".git" ]; then
              git clone -b tests/updates https://github.com/${{ github.repository }}.git .
            else
              git fetch origin tests/updates
              git reset --hard FETCH_HEAD
            fi

            echo "➡️ Preparing Docker..."
            # Проверяем наличие docker, а не пытаемся его судорожно ставить
            if ! command -v docker &> /dev/null; then
                echo "Error: Docker is not installed on the server!"
                exit 1
            fi

            echo "➡️ Rebuilding container..."
            docker stop z-player || true
            docker rm z-player || true
            
            # Собираем образ. Если есть Dockerfile в корне — всё взлетит.
            docker build -t z-player .

            echo "➡️ Starting container..."
            docker run -d \
              --restart unless-stopped \
              --name z-player \
              -p 3001:3001 \
              z-player

            echo "✅ Deploy successful!"
          EOF
