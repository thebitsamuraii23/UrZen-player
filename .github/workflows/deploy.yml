name: Deploy z-player to EC2

on:
  push:
    branches:
      - tests/updates

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu  # или root, если включишь PermitRootLogin yes вручную
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -ex

            PROJECT_DIR="/home/ubuntu/z-player"  # если хочешь в /root - смени, но сначала почини права/логин

            # Дебаг: кто мы и где home
            whoami
            pwd
            ls -ld /home/ubuntu || echo "Home dir проблема, права сломаны или юзер проблема"

            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            echo "➡️ Обновление кода..."
            if [ ! -d ".git" ]; then
              git clone -b tests/updates https://github.com/thebitsamuraii23/UrZen-player.git .
            else
              git fetch origin tests/updates
              git reset --hard FETCH_HEAD
              git clean -fd
            fi

            git log -1 --pretty=format:"Последний коммит: %h %s %cr"

            echo "➡️ Работа с Docker..."
            sudo docker stop z-player || true
            sudo docker rm z-player || true
            sudo docker rmi z-player || true

            echo "➡️ Билд..."
            COMMIT_HASH=$(git rev-parse --short HEAD)
            if ! sudo docker build --no-cache -t z-player:$COMMIT_HASH .; then
              echo "❌ Билд упал, ошибка!"
              exit 1
            fi

            echo "➡️ Запуск..."
            sudo docker run -d --restart unless-stopped --name z-player -p 3001:3001 z-player:$COMMIT_HASH

            echo "✅ Статус:"
            sudo docker ps | grep z-player
            sudo docker logs --tail 20 z-player || true
