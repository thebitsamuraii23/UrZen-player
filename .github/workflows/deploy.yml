name: Deploy z-player to EC2

on:
  push:
    branches:
      - tests/updates

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Важно: Host Verification мы проходим через ssh-keyscan ниже
          known_hosts: "unnecessary"
          if_key_exists: replace

      - name: Execute Remote Deployment
        run: |
          # 1. Очистка переменных (защита от твоих пробелов)
          CLEAN_HOST=$(echo "${{ secrets.SSH_HOST }}" | xargs)
          CLEAN_USER=$(echo "${{ secrets.SSH_USER }}" | xargs)
          
          echo "➡️ Пробуем пробиться на $CLEAN_HOST под именем $CLEAN_USER"
          
          # 2. Добавляем сервер в доверенные
          ssh-keyscan -H "$CLEAN_HOST" >> ~/.ssh/known_hosts
          
          # 3. Деплой. Добавил -v для подробного лога, если опять упадет
          ssh -v -o StrictHostKeyChecking=no "$CLEAN_USER@$CLEAN_HOST" << 'EOF'
            set -e
            
            # Работаем в домашней папке юзера
            PROJECT_DIR="$HOME/z-player"
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            echo "➡️ Обновляем код..."
            if [ ! -d ".git" ]; then
              git clone -b tests/updates https://github.com/${{ github.repository }}.git .
            else
              git fetch origin tests/updates
              git reset --hard FETCH_HEAD
            fi

            echo "➡️ Перезапуск контейнера..."
            docker stop z-player || true
            docker rm z-player || true
            docker build -t z-player .
            docker run -d --restart unless-stopped --name z-player -p 3001:3001 z-player
            
            echo "✅ Победа, пупсяндра!"
          EOF
