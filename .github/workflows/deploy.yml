name: Deploy z-player to EC2

on:
  push:
    branches:
      - tests/updates

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa || true
          ls -la ~/.ssh
          echo "Длина ключа: $(wc -l < ~/.ssh/id_rsa || echo 0)"
          ssh-keyscan -t ed25519 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts
          echo "Host *" > ~/.ssh/config
          echo "  StrictHostKeyChecking accept-new" >> ~/.ssh/config
          echo "  UserKnownHostsFile ~/.ssh/known_hosts" >> ~/.ssh/config

      - name: Deployment Execution
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes ubuntu@${{ secrets.SSH_HOST }} /bin/bash << 'EOF'
            set -ex

            PROJECT_DIR="/home/ubuntu/z-player"

            # Дебаг прав
            ls -ld /home/ubuntu || echo "Home dir не существует или права проблема"
            whoami  # должен быть ubuntu

            mkdir -p "$PROJECT_DIR" || { echo "mkdir failed, права нахуй сломаны"; exit 1; }
            cd "$PROJECT_DIR"

            echo "➡️ Обновление кода..."
            if [ ! -d ".git" ]; then
              git clone -b tests/updates https://github.com/${{ github.repository }}.git .
            else
              git fetch origin tests/updates
              git reset --hard FETCH_HEAD
              git clean -fd
            fi

            git log -1 --pretty=format:"Последний коммит: %h %s %cr"

            echo "➡️ Работа с Docker..."
            sudo docker stop z-player || true
            sudo docker rm z-player || true
            sudo docker rmi z-player || true

            echo "➡️ Билд с уникальным тегом..."
            COMMIT_HASH=$(git rev-parse --short HEAD)
            if ! sudo docker build --no-cache -t z-player:$COMMIT_HASH .; then
              echo "❌ Билд упал, ошибка!"
              exit 1
            fi

            echo "➡️ Запуск новой версии..."
            sudo docker run -d --restart unless-stopped --name z-player -p 3001:3001 z-player:$COMMIT_HASH

            echo "✅ Статус:"
            sudo docker ps | grep z-player
            sudo docker logs --tail 20 z-player || true
          EOF
