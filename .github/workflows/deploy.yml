name: Deploy z-player to EC2

on:
  push:
    branches:
      - tests/updates

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "unnecessary"
          if_key_exists: replace

      - name: Execute Remote Deployment
        run: |
          # Очищаем хост и юзера от пробелов
          CLEAN_HOST=$(echo "${{ secrets.SSH_HOST }}" | xargs)
          CLEAN_USER=$(echo "${{ secrets.SSH_USER }}" | xargs)
          
          echo "➡️ Попытка подключения к $CLEAN_HOST под юзером $CLEAN_USER..."
          
          # Сканируем ключи хоста
          ssh-keyscan -H "$CLEAN_HOST" >> ~/.ssh/known_hosts
          
          # Команда SSH с защитой от зависания
          ssh -o StrictHostKeyChecking=no "$CLEAN_USER@$CLEAN_HOST" << 'EOF'
            set -e

            # Используем домашнюю папку текущего пользователя
            PROJECT_DIR="$HOME/z-player"
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            echo "➡️ Обновление кода..."
            if [ ! -d ".git" ]; then
              git clone -b tests/updates https://github.com/${{ github.repository }}.git .
            else
              git fetch origin tests/updates
              git reset --hard FETCH_HEAD
            fi

            echo "➡️ Сборка Docker..."
            docker stop z-player || true
            docker rm z-player || true
            docker build -t z-player .

            echo "➡️ Запуск..."
            docker run -d \
              --restart unless-stopped \
              --name z-player \
              -p 3001:3001 \
              z-player

            echo "✅ Готово!"
          EOF
