version: '3.8'

services:
  app:
    build: .
    container_name: z-beta-player
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/music.db
    volumes:
      - ./data:/app/data
      - ./music:/app/music
    restart: unless-stopped
    networks:
      - z-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  z-network:
    driver: bridge

volumes:
  data:
    driver: local
